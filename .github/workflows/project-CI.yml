name: SVV Project CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  validation:

    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # STEP 1: Checkout Repository
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4



      # ==========================================
      # STEP 2: Display Repository Structure
      # ==========================================

      - name: Show Repository Structure
        run: |
          echo "Displaying repository structure..."
          ls -R



      # ==========================================
      # STEP 3: Verify Required Project Folders
      # ==========================================

      - name: Verify Project Folders
        run: |

          test -d Requirements
          echo "Requirements folder exists"

          test -d z-model
          echo "z-model folder exists"

          test -d vdm-specifications
          echo "vdm-specifications folder exists"



      # ==========================================
      # STEP 4: Verify Important Files
      # ==========================================

      - name: Verify Documentation Files
        run: |

          find . -name "*.md"
          echo "Markdown files detected"

          find . -name "*.als"
          echo "Alloy specification files detected"



      # ==========================================
      # STEP 5: Pipeline Success Message
      # ==========================================

      - name: Pipeline Success
        run: |
          echo "SVV CI Pipeline Executed Successfully"
