name: SVV Project CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  validation:

    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # STEP 1: Checkout Repository
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4



      # ==========================================
      # STEP 2: Display Repository Structure
      # ==========================================

      - name: Show Repository Structure
        run: |
          echo "Displaying repository structure..."
          ls -R



      # ==========================================
      # STEP 3: Validate Requirements Folder
      # ==========================================

      - name: Validate Requirements Folder
        run: |
          test -d Requirements
          echo "Requirements folder exists"



      # ==========================================
      # STEP 4: Validate Z Model
      # ==========================================

      - name: Validate Z Specifications
        run: |
          test -d z-model
          find . -name "*.zed"
          echo "Z specification files detected"



      # ==========================================
      # STEP 5: Validate VDM Specifications
      # ==========================================

      - name: Validate VDM Specifications
        run: |
          test -d vdm-specifications
          find . -name "*.vdmsl"
          echo "VDM specification files detected"



      # ==========================================
      # STEP 6: Validate Alloy Models
      # ==========================================

      - name: Validate Alloy Models
        run: |
          find . -name "*.als"
          echo "Alloy specification files detected"



      # ==========================================
      # STEP 7: Validate Documentation
      # ==========================================

      - name: Validate Documentation Files
        run: |
          find . -name "*.md"
          echo "Markdown documentation detected"



      # ==========================================
      # STEP 8: Final Pipeline Status
      # ==========================================

      - name: Pipeline Success
        run: |
          echo "SVV CI Pipeline Executed Successfully"
