name: SVV Project CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  validation:

    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # STEP 1: Checkout Repository
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4



      # ==========================================
      # STEP 2: Display Repository Structure
      # ==========================================

      - name: Show Repository Structure
        run: |
          echo "Displaying repository structure..."
          ls -R



      # ==========================================
      # STEP 3: Verify Required Project Folders
      # ==========================================

      - name: Verify Project Folders
        run: |

          test -d Requirements
          echo "Requirements folder exists"

          test -d z-model
          echo "z-model folder exists"

          test -d vdm-specifications
          echo "vdm-specifications folder exists"



      # ==========================================
      # STEP 4: Validate Alloy Specifications
      # ==========================================

      - name: Validate Alloy Models
        run: |

          find . -name "*.als"

          echo "Alloy specification files detected"



      # ==========================================
      # STEP 5: Validate Z Specifications
      # ==========================================

      - name: Validate Z Schemas
        run: |

          find . -name "*.zed"

          echo "Z schema files detected"



      # ==========================================
      # STEP 6: Validate VDM Specifications
      # ==========================================

      - name: Validate VDM Specifications
        run: |

          find . -name "*.vdmsl"

          echo "VDM specification files detected"



      # ==========================================
      # STEP 7: Validate Documentation Files
      # ==========================================

      - name: Validate Documentation
        run: |

          find . -name "*.md"

          echo "Documentation files detected"



      # ==========================================
      # STEP 8: Pipeline Success
      # ==========================================

      - name: Pipeline Success
        run: |
          echo "SVV CI Pipeline Executed Successfully"
